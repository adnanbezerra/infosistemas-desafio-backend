services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: aivacol-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: aivacol-mssql-init
    depends_on:
      - mssql
    environment:
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    volumes:
      - ./docker/mssql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      /bin/sh -c '
      until /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1";
      do sleep 2;
      done;
      /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P "$$MSSQL_SA_PASSWORD" -C -i /docker-entrypoint-initdb.d/init.sql
      '
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: aivacol-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aivacol-api
    env_file:
      - .env
    environment:
      DB_HOST: mssql
      REDIS_HOST: redis
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      mssql-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  mssql-data:
  redis-data:
